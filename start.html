<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBT — Handmade Brazilian Tobacco</title>
  <meta name="description" content="HBT — Handmade Brazilian Tobacco. A experiência começa aqui." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --noir:#0A0A0A;
      --ash:#8A8A8A;
      --amber:#B8924A;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:radial-gradient(130% 120% at 50% 32%, #FFFFFF 52%, #ECECEC 100%);
      font-family:'Jost','Helvetica Neue',Arial,sans-serif;
      color:var(--noir);
      cursor:crosshair;
    }

    /* Campo de partículas */
    #field{position:fixed;inset:0;z-index:1;display:block;}

    /* Palco central */
    .stage{
      position:fixed;inset:0;z-index:2;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;pointer-events:none;
    }
    /* halo branco atrás do HBT para manter legibilidade sobre as partículas */
    .stage::before{
      content:"";position:absolute;width:min(60vw,560px);height:min(60vw,560px);
      background:radial-gradient(closest-side, rgba(255,255,255,0.92), rgba(255,255,255,0) 72%);
      pointer-events:none;
    }
    .eyebrow{
      position:relative;
      font-size:clamp(.6rem,1.4vw,.72rem);
      text-transform:uppercase;letter-spacing:.36em;
      color:var(--ash);margin-bottom:1.6rem;
      opacity:0;animation:rise 1.3s .3s ease forwards;
    }
    .mark{
      position:relative;
      font-family:'Cormorant Garamond',Georgia,serif;
      font-weight:400;
      font-size:clamp(5rem,22vw,15rem);
      line-height:.9;letter-spacing:.08em;padding-left:.08em;
      color:var(--noir);
      opacity:0;animation:rise 1.6s .5s ease forwards;
    }
    .enter{
      position:relative;pointer-events:auto;
      margin-top:2.4rem;
      font-size:.72rem;text-transform:uppercase;letter-spacing:.28em;
      color:var(--noir);text-decoration:none;
      padding:.2rem 0;border-bottom:1px solid transparent;
      opacity:0;animation:rise 1.6s .9s ease forwards;
      transition:color .4s ease,border-color .4s ease;
    }
    .enter:hover,.enter:focus-visible{color:var(--amber);border-color:var(--amber);outline:none;}

    /* Controle de som */
    .sound{
      position:fixed;z-index:3;bottom:1.6rem;left:50%;transform:translateX(-50%);
      pointer-events:auto;
      display:inline-flex;align-items:center;gap:.6rem;
      background:transparent;border:1px solid rgba(10,10,10,.18);
      color:var(--noir);font:inherit;font-size:.66rem;text-transform:uppercase;letter-spacing:.24em;
      padding:.7rem 1.3rem;border-radius:999px;cursor:pointer;
      opacity:0;animation:rise 1.6s 1.2s ease forwards;
      transition:border-color .4s ease,color .4s ease;
    }
    .sound:hover,.sound:focus-visible{border-color:var(--amber);color:var(--amber);outline:none;}
    .sound .dot{width:6px;height:6px;border-radius:50%;background:var(--ash);transition:background .3s ease;}
    .sound.on .dot{background:var(--amber);}

    .origin{
      position:fixed;z-index:3;top:1.6rem;left:50%;transform:translateX(-50%);
      font-size:.6rem;text-transform:uppercase;letter-spacing:.32em;color:var(--ash);
      opacity:0;animation:rise 1.3s .3s ease forwards;
    }

    @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;}
      .eyebrow,.mark,.enter,.sound,.origin{opacity:1;}
    }
  </style>
</head>
<body>
  <canvas id="field" aria-hidden="true"></canvas>

  <p class="origin">Handcrafted in Brazil</p>

  <div class="stage">
    <p class="eyebrow">Handmade Brazilian Tobacco</p>
    <h1 class="mark">HBT</h1>
    <a class="enter" href="index.html">Entrar</a>
  </div>

  <button class="sound" id="sound" aria-pressed="false" aria-label="Ativar som ambiente">
    <span class="dot"></span><span id="soundLabel">Som</span>
  </button>

  <script>
  (function(){
    "use strict";
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let W=0,H=0,DPR=1;
    let particles=[];
    const pointer={x:-9999,y:-9999,px:-9999,py:-9999,active:false,speed:0};

    /* ---------- Setup do canvas ---------- */
    function resize(){
      DPR=Math.min(window.devicePixelRatio||1,2);
      W=window.innerWidth;
      H=window.innerHeight;
      canvas.width=W*DPR;canvas.height=H*DPR;
      ctx.setTransform(DPR,0,0,DPR,0,0);
      build();
    }

    /* ---------- Partículas: fragmentos de folha picada ---------- */
    function build(){
      const area=W*H;
      const count=Math.min(650,Math.max(180,Math.floor(area/2600)));
      particles=[];
      for(let i=0;i<count;i++){
        const x=Math.random()*W, y=Math.random()*H;
        particles.push({
          hx:x,hy:y,x,y,vx:0,vy:0,
          ang:Math.random()*Math.PI,
          len:3+Math.random()*8,
          w:0.8+Math.random()*1.4,
          a:0.35+Math.random()*0.45
        });
      }
    }

    const R=175;         // raio de influência do cursor
    const RR=R*R;

    function tick(){
      // velocidade do ponteiro (suavizada) — alimenta o som
      const dxp=pointer.x-pointer.px, dyp=pointer.y-pointer.py;
      const inst=Math.min(60,Math.hypot(dxp,dyp));
      pointer.speed+=(inst-pointer.speed)*0.15;
      pointer.px=pointer.x;pointer.py=pointer.y;

      ctx.clearRect(0,0,W,H);

      for(let i=0;i<particles.length;i++){
        const p=particles[i];
        let ax=(p.hx-p.x)*0.02;       // mola de volta ao ponto de origem
        let ay=(p.hy-p.y)*0.02;

        if(pointer.active){
          const dx=p.x-pointer.x, dy=p.y-pointer.y;   // do cursor para a partícula
          const d2=dx*dx+dy*dy;
          if(d2<RR && d2>0.001){
            const d=Math.sqrt(d2);
            const f=1-d/R;
            const force=f*f*5.0;        // repulsão magnética
            const nx=dx/d, ny=dy/d;     // aponta para fora do cursor
            // empurra para fora (abre a bolha) + leve componente tangencial (curvatura)
            ax+= nx*force + (-ny)*force*0.4;
            ay+= ny*force + ( nx)*force*0.4;
          }
        }

        p.vx=(p.vx+ax)*0.85;
        p.vy=(p.vy+ay)*0.85;
        p.x+=p.vx;p.y+=p.vy;

        const sp=Math.hypot(p.vx,p.vy);
        if(sp>0.05) p.ang=Math.atan2(p.vy,p.vx);

        // desenha o fragmento
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.ang);
        ctx.fillStyle='rgba(10,10,10,'+(p.a+Math.min(0.25,sp*0.04)).toFixed(3)+')';
        ctx.fillRect(-p.len/2,-p.w/2,p.len,p.w);
        ctx.restore();
      }

      updateAudio();
      requestAnimationFrame(tick);
    }

    /* ---------- Ponteiro ---------- */
    function move(x,y){pointer.x=x;pointer.y=y;pointer.active=true;}
    window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
    window.addEventListener('mouseleave',()=>{pointer.active=false;});
    window.addEventListener('touchmove',e=>{
      if(e.touches[0]) move(e.touches[0].clientX,e.touches[0].clientY);
    },{passive:true});
    window.addEventListener('touchend',()=>{pointer.active=false;});

    /* ---------- Áudio: folhas secas sintetizadas ---------- */
    let actx,master,rustleGain,hp,started=false,soundOn=false,lastGrain=0;
    function initAudio(){
      if(started) return;
      started=true;
      actx=new (window.AudioContext||window.webkitAudioContext)();

      // buffer de ruído branco em loop
      const size=2*actx.sampleRate;
      const buf=actx.createBuffer(1,size,actx.sampleRate);
      const dat=buf.getChannelData(0);
      for(let i=0;i<size;i++) dat[i]=Math.random()*2-1;
      const src=actx.createBufferSource();
      src.buffer=buf;src.loop=true;

      const band=actx.createBiquadFilter();
      band.type='bandpass';band.frequency.value=3400;band.Q.value=0.5;
      hp=actx.createBiquadFilter();
      hp.type='highpass';hp.frequency.value=1800;

      rustleGain=actx.createGain();rustleGain.gain.value=0;
      master=actx.createGain();master.gain.value=0.85;

      src.connect(band);band.connect(hp);hp.connect(rustleGain);
      rustleGain.connect(master);master.connect(actx.destination);
      src.start();
    }

    // grãos curtos de estalo, quando o cursor se move rápido
    function grain(){
      if(!actx||!soundOn) return;
      const now=actx.currentTime;
      if(now-lastGrain<0.04) return;
      lastGrain=now;
      const len=0.03+Math.random()*0.04;
      const n=Math.floor(actx.sampleRate*len);
      const b=actx.createBuffer(1,n,actx.sampleRate);
      const d=b.getChannelData(0);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1);
      const s=actx.createBufferSource();s.buffer=b;
      const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=2600;
      const g=actx.createGain();
      g.gain.setValueAtTime(0.0001,now);
      g.gain.exponentialRampToValueAtTime(0.06+Math.random()*0.05,now+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001,now+len);
      s.connect(f);f.connect(g);g.connect(master);s.start(now);s.stop(now+len);
    }

    function updateAudio(){
      if(!actx||!soundOn) return;
      const t=Math.min(0.22,pointer.speed*0.0075);   // intensidade segue a velocidade
      rustleGain.gain.setTargetAtTime(t,actx.currentTime,0.06);
      if(pointer.speed>18 && Math.random()<0.5) grain();
    }

    /* ---------- Toggle de som ---------- */
    const soundBtn=document.getElementById('sound');
    const soundLabel=document.getElementById('soundLabel');
    function setSound(on){
      soundOn=on;
      soundBtn.classList.toggle('on',on);
      soundBtn.setAttribute('aria-pressed',on?'true':'false');
      soundLabel.textContent=on?'Som ligado':'Som';
      if(on && actx && actx.state==='suspended') actx.resume();
    }
    soundBtn.addEventListener('click',()=>{
      initAudio();
      if(actx.state==='suspended') actx.resume();
      setSound(!soundOn);
    });
    // primeiro clique em qualquer lugar (fora do "Entrar") também ativa o som
    window.addEventListener('pointerdown',e=>{
      if(e.target.closest('.enter')||e.target.closest('.sound')) return;
      if(!started){initAudio();actx.resume();setSound(true);}
    });

    window.addEventListener('resize',resize);
    resize();
    if(!reduce) tick();
    else { // estático: desenha uma vez
      ctx.clearRect(0,0,W,H);
      for(const p of particles){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ang);
        ctx.fillStyle='rgba(10,10,10,'+p.a.toFixed(3)+')';
        ctx.fillRect(-p.len/2,-p.w/2,p.len,p.w);ctx.restore();
      }
    }
  })();
  </script>
</body>
</html>
