<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBT — Handmade Brazilian Tobacco</title>
  <meta name="description" content="Tabaco artesanal brasileiro com sobriedade europeia. Handcrafted in Brazil." />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="google" content="notranslate" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/start.css" />
</head>
<body>

  <section class="start" aria-label="Entrada — HBT">
    <canvas class="start__canvas" id="leaf-canvas" aria-hidden="true"></canvas>
    <div class="start__spot" aria-hidden="true"></div>

    <div class="start__lang" role="group" aria-label="Idioma" translate="no">
      <button type="button" data-lang="pt">PT</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="es">ES</button>
      <button type="button" data-lang="no">NO</button>
    </div>

    <div class="start__content">
      <p class="start__eyebrow" id="s-eyebrow">Handmade Brazilian Tobacco</p>
      <h1 class="start__mark" translate="no">HBT</h1>
      <p class="start__tagline" id="s-tag">Tabaco artesanal brasileiro.</p>
      <button class="start__enter" id="s-enter" type="button">
        <span id="s-enter-label">Entrar</span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 12h15M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <p class="start__origin">Handcrafted in Brazil</p>
    </div>

    <p class="start__hint" id="s-hint">Clique para ativar o som</p>

    <button class="start__mute" id="s-mute" type="button" aria-label="Ativar ou silenciar o som" aria-pressed="false">
      <svg class="start__mute-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8M19 5c3 2.5 3 11.5 0 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <svg class="start__mute-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </section>

  <script src="assets/js/seo.js"></script>
  <script src="assets/js/start.js"></script>
</body>
</html>
